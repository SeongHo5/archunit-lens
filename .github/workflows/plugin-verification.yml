name: Plugin Verification

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  plugin-verification:
    name: Build and verify plugin
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin distribution
        run: ./gradlew buildPlugin --no-daemon

      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin --no-daemon

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: archunit-lens-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload Plugin Verifier reports
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier/**
          if-no-files-found: warn
