name: Publish Plugin

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: publish-plugin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-plugin:
    name: Publish plugin to JetBrains Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check tag matches Gradle version
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(grep '^version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag v$tag_version does not match Gradle version $project_version"
            exit 1
          fi

      - name: Check Marketplace secrets
        run: |
          for name in PUBLISH_TOKEN CERTIFICATE_CHAIN PRIVATE_KEY PRIVATE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "$name secret is not set"
              exit 1
            fi
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify and publish plugin
        run: ./gradlew check buildPlugin verifyPlugin publishPlugin --no-daemon
